<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Ticket — BConnect</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#080f1e;
  --navy-mid:#0d1835;
  --navy-light:#162040;
  --navy-border:rgba(255,255,255,0.08);
  --navy-border-hover:rgba(255,255,255,0.18);
  --white:#ffffff;
  --cream:#f1f5f9;
  --cream-dim:#94a3b8;
  --amber:#f5a623;
  --amber-dark:#d4891a;
  --green:#22c55e;
  --red:#ef4444;
}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--navy);min-height:100vh;color:var(--cream);
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:48px 16px 72px;
}

.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:36px}
.logo-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--amber),var(--amber-dark));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  color:var(--navy);font-size:1.3rem;font-weight:900;
}
.logo-text{font-size:1.4rem;font-weight:800;color:var(--white)}

.card{
  background:var(--navy-mid);border:1px solid var(--navy-border);
  border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.5);
  width:100%;max-width:480px;padding:36px;
}
.card-title{font-size:1.3rem;font-weight:800;color:var(--white);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card-sub{font-size:.85rem;color:var(--cream-dim);margin-bottom:28px;line-height:1.5}

.input-wrap{position:relative;margin-bottom:12px}
.input-wrap input{
  width:100%;padding:14px 18px;
  border:1.5px solid var(--navy-border);border-radius:12px;
  font-size:1rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  outline:none;font-family:inherit;transition:border-color .2s;
  background:rgba(255,255,255,.05);color:var(--white);
}
.input-wrap input::placeholder{color:var(--cream-dim);letter-spacing:0;font-weight:400}
.input-wrap input:focus{border-color:rgba(245,166,35,.4);background:rgba(255,255,255,.07)}

.btn-verify{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--amber),var(--amber-dark));
  color:var(--navy);border:none;border-radius:12px;
  font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;
  margin-top:4px;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-verify:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,.35)}
.btn-verify:disabled{background:rgba(255,255,255,.1);color:var(--cream-dim);cursor:not-allowed;transform:none;box-shadow:none}

.or-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--cream-dim);font-size:.8rem;font-weight:600}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--navy-border)}

.btn-scan{
  width:100%;padding:13px;background:rgba(255,255,255,.04);
  color:var(--cream-dim);border:1.5px dashed var(--navy-border-hover);
  border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;font-family:inherit;
}
.btn-scan:hover{border-color:rgba(245,166,35,.4);color:var(--amber);background:rgba(245,166,35,.05)}

#camera-wrap{display:none;margin-top:16px;border-radius:12px;overflow:hidden;position:relative;background:#000;border:1px solid var(--navy-border)}
#camera-wrap video{width:100%;display:block;max-height:260px;object-fit:cover}
#scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
#scan-box{width:180px;height:180px;border:3px solid var(--amber);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}

#result{margin-top:24px;display:none}

.result-valid{background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.25);border-radius:16px;padding:24px}
.result-used{background:rgba(245,166,35,.07);border:1.5px solid rgba(245,166,35,.2);border-radius:16px;padding:24px}
.result-invalid{background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.2);border-radius:16px;padding:24px}

.btn-mark-used{
  width:100%;margin-top:10px;padding:12px;
  background:linear-gradient(135deg,var(--amber),var(--amber-dark));
  border:none;color:var(--navy);border-radius:10px;
  font-weight:800;cursor:pointer;font-size:.9rem;font-family:inherit;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn-mark-used:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,.3)}
.btn-mark-used:disabled{background:rgba(255,255,255,.08);color:var(--cream-dim);cursor:not-allowed;transform:none;box-shadow:none}

.result-icon{display:flex;justify-content:center;margin-bottom:12px}
.result-status{font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:16px}

.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--navy-border);gap:12px}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:.78rem;font-weight:600;color:var(--cream-dim);white-space:nowrap}
.detail-value{font-size:.88rem;font-weight:700;color:var(--cream);text-align:right}

.check-again{
  width:100%;margin-top:14px;padding:11px;
  background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.25);
  color:var(--green);border-radius:10px;font-weight:700;cursor:pointer;
  font-size:.88rem;font-family:inherit;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.check-again:hover{background:rgba(34,197,94,.14)}
.check-again-red{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#f87171}
.check-again-red:hover{background:rgba(239,68,68,.14)}

.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.1);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}

.recent-section{margin-top:32px;width:100%;max-width:480px}
.recent-title{font-size:.78rem;font-weight:700;color:var(--cream-dim);margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.recent-item{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.recent-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-valid{background:var(--green)}
.dot-invalid{background:var(--red)}
.recent-code{font-size:.82rem;font-weight:800;font-family:monospace;color:var(--white)}
.recent-info{font-size:.75rem;color:var(--cream-dim)}
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>

<a class="logo" href="/">
  <div class="logo-icon">B</div>
  <div class="logo-text">BConnect</div>
</a>

<div class="card">
  <div class="card-title">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    Verify Ticket
  </div>
  <div class="card-sub">Enter a ticket code or scan the QR code to validate entry.</div>

  <div class="input-wrap">
    <input id="code-input" type="text" placeholder="e.g. TKT-ABC123XY"
      autocomplete="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')verifyTicket()">
  </div>
  <button class="btn-verify" id="verify-btn" onclick="verifyTicket()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Verify Ticket
  </button>

  <div class="or-divider">or</div>
  <button class="btn-scan" id="btn-scan" onclick="toggleCamera()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Scan QR Code with Camera
  </button>
  <div id="camera-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <div id="scan-overlay"><div id="scan-box"></div></div>
  </div>

  <div id="result"></div>
</div>

<div class="recent-section" id="recent-section" style="display:none">
  <div class="recent-title">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Recent Scans
  </div>
  <div id="recent-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
function showVTToast(msg, type) {
  let t = document.getElementById('vt-toast');
  if (!t) { t = document.createElement('div'); t.id = 'vt-toast'; t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);padding:13px 24px;border-radius:14px;font-size:.9rem;font-weight:700;z-index:99999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:90vw;text-align:center;pointer-events:none;font-family:inherit'; document.body.appendChild(t); }
  const bg = { error:'#dc2626', success:'#059669', warning:'#d4891a' };
  t.style.background = bg[type] || bg.error; t.style.color = '#fff';
  t.textContent = msg; t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._tmr); t._tmr = setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(120px)'; }, 4000);
}
let cameraActive = false;
let camStream = null;
let scanInterval = null;
let recentScans = JSON.parse(sessionStorage.getItem('bct_scans') || '[]');

function renderRecent() {
  if (!recentScans.length) { document.getElementById('recent-section').style.display = 'none'; return; }
  document.getElementById('recent-section').style.display = 'block';
  document.getElementById('recent-list').innerHTML = recentScans.slice().reverse().slice(0, 8).map(s => `
    <div class="recent-item">
      <div class="recent-dot ${s.valid ? 'dot-valid' : 'dot-invalid'}"></div>
      <div>
        <div class="recent-code">${s.code}</div>
        <div class="recent-info">${s.valid ? (s.event + ' — ' + s.buyer) : 'Invalid ticket'} &bull; ${s.time}</div>
      </div>
    </div>`).join('');
}

async function verifyTicket() {
  const raw = document.getElementById('code-input').value.trim().toUpperCase().replace(/\s+/g,'');
  if (!raw) { document.getElementById('code-input').focus(); return; }
  const btn = document.getElementById('verify-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Checking…';
  document.getElementById('result').style.display = 'none';
  try {
    const res = await fetch('/api/tickets/verify/' + encodeURIComponent(raw));
    const data = await res.json();
    showResult(raw, data);
  } catch(e) {
    showResult(raw, { valid: false, error: 'Network error. Please check your connection.' });
  }
  btn.disabled = false;
  btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Verify Ticket`;
}

function showResult(code, data) {
  const el = document.getElementById('result');
  el.style.display = 'block';
  const now = new Date().toLocaleTimeString('en-KE', { hour:'2-digit', minute:'2-digit' });

  if (data.valid && data.ticket) {
    const t = data.ticket;
    const alreadyUsed = t.status === 'used';
    const fmtDate = d => d ? new Date(d).toLocaleDateString('en-KE', { weekday:'short', day:'numeric', month:'short', year:'numeric' }) : '—';
    const cardClass = alreadyUsed ? 'result-used' : 'result-valid';
    const iconSvg = alreadyUsed
      ? `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
      : `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
    const statusLabel = alreadyUsed
      ? '<span style="color:#f5a623">Already Scanned — Entry Was Used</span>'
      : '<span style="color:#22c55e">Valid Ticket — Entry Granted</span>';
    const markBtn = alreadyUsed
      ? `<div style="background:rgba(245,166,35,.08);border:1.5px solid rgba(245,166,35,.2);border-radius:10px;padding:10px 14px;text-align:center;font-size:.82rem;font-weight:700;color:#f5a623;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> This ticket was already scanned and marked as used.</div>`
      : `<button class="btn-mark-used" id="mark-used-btn" onclick="markAsUsed('${t.ticket_code}')"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Mark as Used (Scan Entry)</button>`;
    el.innerHTML = `
      <div class="${cardClass}">
        <div class="result-icon">${iconSvg}</div>
        <div class="result-status">${statusLabel}</div>
        <div class="detail-row"><span class="detail-label">Ticket Code</span><span class="detail-value" style="font-family:monospace;color:var(--amber)">${t.ticket_code}</span></div>
        <div class="detail-row"><span class="detail-label">Event</span><span class="detail-value">${t.event_title}</span></div>
        <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${fmtDate(t.event_date)}</span></div>
        <div class="detail-row"><span class="detail-label">Venue</span><span class="detail-value">${t.venue}</span></div>
        <div class="detail-row"><span class="detail-label">Buyer</span><span class="detail-value">${t.buyer_name}</span></div>
        <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${t.buyer_phone || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">Qty</span><span class="detail-value">${t.quantity} ticket${t.quantity > 1 ? 's' : ''}</span></div>
        <div class="detail-row"><span class="detail-label">Amount Paid</span><span class="detail-value" style="color:var(--green)">${t.total_amount ? 'Ksh ' + Number(t.total_amount).toLocaleString() : 'FREE'}</span></div>
        <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:${alreadyUsed ? 'var(--amber)' : 'var(--green)'};text-transform:capitalize">${t.status}</span></div>
        ${markBtn}
        <button class="check-again" style="margin-top:8px" onclick="resetForm()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          Verify Another Ticket
        </button>
      </div>`;
    recentScans.push({ code, valid: !alreadyUsed, event: t.event_title, buyer: t.buyer_name, time: now, used: alreadyUsed });
  } else {
    el.innerHTML = `
      <div class="result-invalid">
        <div class="result-icon"><svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
        <div class="result-status"><span style="color:#f87171">Invalid Ticket</span></div>
        <p style="text-align:center;font-size:.88rem;color:#f87171;margin-bottom:14px">${data.error || 'This ticket code was not found in our system.'}</p>
        <button class="check-again check-again-red" onclick="resetForm()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          Try Another Code
        </button>
      </div>`;
    recentScans.push({ code, valid: false, time: now });
  }

  if (recentScans.length > 50) recentScans = recentScans.slice(-50);
  sessionStorage.setItem('bct_scans', JSON.stringify(recentScans));
  renderRecent();
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function markAsUsed(code) {
  const btn = document.getElementById('mark-used-btn');
  if (!btn) return;
  btn.style.background = 'rgba(239,68,68,.2)';
  btn.style.color = '#f87171';
  btn.style.borderColor = 'rgba(239,68,68,.3)';
  btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Confirm Mark as Used?`;
  btn.onclick = async () => {
    btn.disabled = true;
    btn.innerHTML = 'Marking…';
    btn.style.background = '';
    btn.style.color = '';
    try {
      const res = await fetch('/api/tickets/mark-used/' + encodeURIComponent(code), { method: 'PUT' });
      const data = await res.json();
      if (data.success) {
        btn.style.cssText = 'width:100%;margin-top:10px;padding:12px;background:rgba(34,197,94,.15);border:1.5px solid rgba(34,197,94,.3);color:#22c55e;border-radius:10px;font-weight:800;font-size:.9rem;cursor:default;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit';
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Entry Marked as Used`;
      } else if (data.alreadyUsed) {
        btn.style.cssText = 'width:100%;margin-top:10px;padding:12px;background:rgba(245,166,35,.1);border:1.5px solid rgba(245,166,35,.2);color:#f5a623;border-radius:10px;font-weight:800;font-size:.9rem;cursor:default;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit';
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Already scanned before`;
      } else {
        btn.disabled = false;
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Mark as Used (Scan Entry)`;
        showVTToast('Error: ' + (data.error || 'Failed to update ticket'), 'error');
      }
    } catch(e) {
      btn.disabled = false;
      btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Mark as Used (Scan Entry)`;
      showVTToast('Network error. Please try again.', 'error');
    }
  };
}

function resetForm() {
  document.getElementById('code-input').value = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('code-input').focus();
}

async function toggleCamera() {
  if (cameraActive) { stopCamera(); return; }
  const wrap = document.getElementById('camera-wrap');
  const btn = document.getElementById('btn-scan');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const video = document.getElementById('cam-video');
    video.srcObject = camStream;
    wrap.style.display = 'block';
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Stop Camera`;
    cameraActive = true;
    scanInterval = setInterval(() => scanFrame(video), 300);
  } catch(e) {
    showVTToast('Camera access denied or not available on this device.', 'error');
  }
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  document.getElementById('camera-wrap').style.display = 'none';
  document.getElementById('btn-scan').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Scan QR Code with Camera`;
  cameraActive = false;
}

function scanFrame(video) {
  if (!video.videoWidth) return;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
  if (code && code.data) {
    const detected = code.data.trim().toUpperCase();
    if (detected.startsWith('TKT-')) {
      stopCamera();
      document.getElementById('code-input').value = detected;
      verifyTicket();
    }
  }
}

(function() {
  const params = new URLSearchParams(window.location.search);
  const c = params.get('code');
  if (c) {
    document.getElementById('code-input').value = c.toUpperCase();
    verifyTicket();
  }
  renderRecent();
})();
</script>
