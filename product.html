<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — BConnect</title>
<link rel="icon" href="/favicon.ico">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#003b6e;
  --navy-deep:#001f3f;
  --sky:#0077cc;
  --sky-light:#e8f4ff;
  --accent:#0094ff;
  --gold:#f0a500;
  --surface:#f7f9fc;
  --white:#ffffff;
  --text:#1a2535;
  --muted:#6b7a91;
  --border:#dde4ef;
  --radius:14px;
  --shadow:0 4px 24px rgba(0,60,120,.10);
}

body{
  font-family:Inter,system-ui,-apple-system,sans-serif;
  background:var(--surface);
  color:var(--text);
  min-height:100vh;
}

/* ── BREADCRUMB ── */
.bc-breadcrumb{
  padding:14px 48px;
  font-size:.8rem;color:var(--muted);
  display:flex;gap:6px;align-items:center;
  max-width:1180px;margin:0 auto;
}
.bc-breadcrumb a{color:var(--sky);text-decoration:none}
.bc-breadcrumb a:hover{text-decoration:underline}
.bc-breadcrumb .sep{opacity:.4}

/* ── MAIN PAGE ── */
.pd-page{
  max-width:1180px;
  margin:0 auto;
  padding:0 24px 64px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:48px;
  align-items:start;
}

/* ── LOADING ── */
.pd-loading{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:55vh;gap:1rem;color:var(--muted);
}
.pd-spinner{
  width:2.4rem;height:2.4rem;
  border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── GALLERY ── */
.gallery{position:sticky;top:80px}
.main-img-wrap{
  background:#fff;
  border-radius:var(--radius);
  border:1.5px solid var(--border);
  overflow:hidden;
  aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:var(--shadow);
}
.main-img-wrap img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .22s;
}
.main-img-wrap:hover img{transform:scale(1.04)}
.badge-pill{
  position:absolute;top:16px;left:16px;
  background:var(--gold);color:#fff;
  font-size:.7rem;font-weight:700;
  padding:4px 10px;border-radius:20px;
  letter-spacing:.5px;text-transform:uppercase;
}
.img-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.92);box-shadow:0 2px 10px rgba(0,0,0,.12);
  font-size:1.1rem;color:var(--navy);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;transition:all .15s;
}
.img-nav:hover{background:#fff;transform:translateY(-50%) scale(1.08)}
.img-nav.left{left:.6rem}
.img-nav.right{right:.6rem}
.img-counter{
  position:absolute;bottom:.55rem;right:.6rem;
  background:rgba(0,0,0,.45);color:#fff;
  font-size:.65rem;font-weight:700;border-radius:9999px;
  padding:.18rem .5rem;
}
.thumbs{display:flex;gap:10px;margin-top:14px}
.thumb{
  flex:1;background:#fff;border-radius:10px;
  border:1.5px solid var(--border);
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.thumb.active,.thumb:hover{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,148,255,.15);
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}

/* ── PRODUCT INFO ── */
.info{padding-top:4px}

.seller-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  background:#fff;border:1.5px solid var(--border);
  border-radius:10px;margin-bottom:18px;
}
.seller-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--navy);color:#fff;
  display:grid;place-items:center;
  font-size:.8rem;font-weight:700;flex-shrink:0;
}
.seller-meta{flex:1;min-width:0}
.seller-name{font-size:.85rem;font-weight:600;color:var(--text)}
.seller-location{font-size:.75rem;color:var(--muted)}
.verified-badge{
  font-size:.72rem;color:#22a84a;font-weight:700;
  background:#f0fdf4;border:1px solid #bbf7d0;
  border-radius:9999px;padding:3px 8px;
  white-space:nowrap;flex-shrink:0;
}

.product-title{
  font-family:Inter,system-ui,-apple-system,sans-serif;
  font-size:2rem;line-height:1.2;
  color:var(--navy-deep);
  margin-bottom:8px;
}
.product-subtitle{
  font-size:.9rem;color:var(--muted);
  margin-bottom:18px;line-height:1.6;
}

.stars-row{
  display:flex;align-items:center;gap:6px;
  margin-bottom:22px;
}
.stars-row .s{color:var(--gold);font-size:1rem;letter-spacing:1px}
.stars-row .count{font-size:.8rem;color:var(--muted)}

/* ── SECTION LABEL ── */
.sect-label{
  font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;color:var(--muted);margin-bottom:10px;
}

/* ── VARIANTS ── */
.variants-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:24px;
}
.vcard{
  border:1.5px solid var(--border);border-radius:10px;
  padding:10px 6px;text-align:center;
  cursor:pointer;background:#fff;
  transition:all .2s;position:relative;
}
.vcard:hover{border-color:var(--accent)}
.vcard.active{
  border-color:var(--accent);background:var(--sky-light);
  box-shadow:0 0 0 3px rgba(0,148,255,.12);
}
.vcard.active::after{
  content:'✓';
  position:absolute;top:5px;right:7px;
  font-size:.65rem;color:var(--accent);font-weight:700;
}
.vcard img{width:100%;height:80px;object-fit:contain;display:block;margin-bottom:6px}
.vcard .v-name{font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard .v-price{font-size:.72rem;color:var(--sky);font-weight:600}

/* Scrollable variant strip (when many variants) */
.vstrip{
  display:flex;gap:10px;overflow-x:auto;
  padding-bottom:6px;margin-bottom:24px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.vstrip::-webkit-scrollbar{display:none}
.vstrip .vcard{flex:0 0 110px;width:110px}

/* ── PRICE ROW ── */
.price-row{
  display:flex;align-items:baseline;gap:10px;
  margin-bottom:20px;
}
.price-main{
  font-family:Inter,system-ui,-apple-system,sans-serif;
  font-size:2.1rem;color:var(--navy-deep);
}
.price-currency{font-size:1rem;font-family:Inter,system-ui,-apple-system,sans-serif;font-weight:600}
.price-old{font-size:.95rem;color:var(--muted);text-decoration:line-through}
.price-save{
  font-size:.75rem;background:#fff0cc;
  color:#b07800;padding:2px 8px;border-radius:20px;font-weight:600;
}
.price-diff-pill{
  font-size:.72rem;font-weight:700;padding:2px 8px;
  border-radius:20px;display:none;
}
.price-diff-pill.down{background:#dcfce7;color:#15803d;display:inline-block}
.price-diff-pill.up{background:#fee2e2;color:#dc2626;display:inline-block}

/* ── QUANTITY ── */
.qty-row{
  display:flex;align-items:center;gap:16px;margin-bottom:24px;
}
.qty-ctrl{
  display:flex;align-items:center;
  border:1.5px solid var(--border);border-radius:10px;
  overflow:hidden;background:#fff;
}
.qty-btn{
  width:38px;height:38px;border:none;background:transparent;
  font-size:1.1rem;cursor:pointer;color:var(--navy);
  transition:background .15s;display:grid;place-items:center;
}
.qty-btn:hover{background:var(--sky-light)}
.qty-val{
  width:42px;text-align:center;
  font-weight:600;font-size:.95rem;color:var(--text);
  border-left:1.5px solid var(--border);
  border-right:1.5px solid var(--border);
  height:38px;display:grid;place-items:center;
}
.stock-info{font-size:.8rem;color:#22a84a;font-weight:500}

/* ── ACTION BUTTONS ── */
.actions{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.btn{
  width:100%;padding:14px 20px;border-radius:10px;
  font-family:Inter,system-ui,-apple-system,sans-serif;
  font-size:.95rem;font-weight:600;
  cursor:pointer;border:none;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-avail{
  background:#fff;border:1.5px solid var(--border);color:var(--navy);
}
.btn-avail:hover{border-color:var(--accent);color:var(--accent)}
.btn-cart{
  background:#fff;border:1.5px solid var(--accent);color:var(--accent);
}
.btn-cart:hover{background:var(--sky-light)}
.btn-buy{
  background:linear-gradient(135deg,var(--sky) 0%,var(--navy) 100%);
  color:#fff;
  box-shadow:0 4px 14px rgba(0,119,204,.35);
}
.btn-buy:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,119,204,.45)}

/* ── ABOUT CARD ── */
.about-card{
  background:#fff;border-radius:var(--radius);
  border:1.5px solid var(--border);
  padding:18px;margin-bottom:0;
}
.about-card h3{
  font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;color:var(--muted);margin-bottom:10px;
}
.about-card p{font-size:.875rem;color:#3a4a5e;line-height:1.65}
.about-card.collapsed p{
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.about-toggle{
  font-size:.75rem;color:var(--accent);font-weight:600;
  cursor:pointer;background:none;border:none;padding:0;margin-top:8px;
  display:inline-block;
}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{
  font-size:.72rem;background:var(--sky-light);
  color:var(--sky);border-radius:20px;
  padding:3px 10px;font-weight:500;
}

/* ── RELATED / MORE PRODUCTS ── */
.more-section{
  grid-column:1/-1;
  padding-top:8px;border-top:1.5px solid var(--border);margin-top:16px;
}
.more-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;padding-top:24px;
}
.more-header h2{
  font-family:Inter,system-ui,-apple-system,sans-serif;
  font-size:1.4rem;color:var(--navy-deep);
}
.more-header a{font-size:.85rem;color:var(--sky);text-decoration:none}
.more-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}
.more-card{
  background:#fff;border-radius:var(--radius);
  border:1.5px solid var(--border);
  overflow:hidden;
  transition:box-shadow .2s,transform .2s;
  cursor:pointer;text-decoration:none;color:inherit;display:block;
}
.more-card:hover{box-shadow:var(--shadow);transform:translateY(-3px)}
.mc-img{
  background:var(--sky-light);
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.mc-img img{width:100%;height:100%;object-fit:cover;display:block}
.mc-info{padding:12px 14px}
.mc-name{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-brand{font-size:.75rem;color:var(--muted);margin-bottom:6px}
.mc-price{font-size:.9rem;font-weight:700;color:var(--sky)}

/* ── TOAST ── */
.pd-toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy-deep);color:#fff;
  padding:.65rem 1.4rem;border-radius:12px;
  font-size:.85rem;font-weight:600;z-index:9999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;opacity:0;
}
.pd-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── MOBILE ── */
@media(max-width:820px){
  .pd-page{
    grid-template-columns:1fr;gap:0;
    padding:0 0 80px;
  }
  .gallery{position:static;padding:16px 16px 0}
  .thumbs{padding:0}
  .info{
    padding:20px 16px 24px;
    background:#fff;
    border-radius:20px 20px 0 0;
    margin-top:-12px;position:relative;z-index:2;
    box-shadow:0 -4px 24px rgba(0,60,120,.08);
  }
  .product-title{font-size:1.5rem}
  .variants-grid{grid-template-columns:repeat(2,1fr)}
  .more-grid{grid-template-columns:repeat(2,1fr)}
  .bc-breadcrumb{padding:10px 16px}
  .more-section{padding:0 16px 32px}
}
@media(max-width:480px){
  .product-title{font-size:1.3rem}
  .price-main{font-size:1.7rem}
}
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>

<!-- BREADCRUMB -->
<div class="bc-breadcrumb" id="bc-breadcrumb">
  <a href="pre-home.html">Home</a><span class="sep">›</span>
  <a href="products.html">Marketplace</a><span class="sep">›</span>
  <span id="bc-title">Loading…</span>
</div>

<!-- MAIN PAGE GRID -->
<div class="pd-page" id="pd-page">
  <div class="pd-loading" id="pd-loading">
    <div class="pd-spinner"></div>
    <div style="font-weight:600;color:var(--muted)">Loading product…</div>
  </div>
</div>

<!-- RELATED PRODUCTS injected here -->
<div id="pd-related-section"></div>

<!-- TOAST -->
<div class="pd-toast" id="pd-toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
var _product        = null;
var _selectedVariant = null;
var _basePrice      = 0;
var _qty            = 1;
var _imgIndex       = 0;
var _images         = [];
var _isFav          = false;

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtKes(n){ return 'Ksh ' + Number(n||0).toLocaleString(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getUser(){
  try{ return JSON.parse(localStorage.getItem('user_profile')||localStorage.getItem('bc_user')||'null'); }
  catch(e){ return null; }
}
function showToast(msg){
  var t = document.getElementById('pd-toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tmr);
  t._tmr = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// ── Load product ──────────────────────────────────────────────────────────────
(function(){
  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  if (!id){ showError('No product ID in URL.'); return; }
  fetch('/api/products/' + encodeURIComponent(id))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.success || !d.product){ showError('Product not found.'); return; }
      renderProduct(d.product);
    })
    .catch(function(){ showError('Could not load product. Check your connection.'); });
})();

function showError(msg){
  document.getElementById('pd-loading').innerHTML =
    '<div style="font-size:2.5rem">😕</div>' +
    '<div style="font-weight:700;color:var(--navy-deep)">' + esc(msg) + '</div>' +
    '<a href="products.html" style="margin-top:.5rem;color:var(--accent);font-weight:700;font-size:.9rem">← Back to Marketplace</a>';
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderProduct(p){
  _product = p;
  _basePrice = p.price || 0;
  _qty = 1;
  _selectedVariant = null;

  // Build image array
  _images = [];
  if (Array.isArray(p.images) && p.images.length) _images = p.images.slice();
  if (p.imageUrl   && !_images.includes(p.imageUrl))   _images.unshift(p.imageUrl);
  if (p.image_url  && !_images.includes(p.image_url))  _images.unshift(p.image_url);
  if (p.image      && !_images.includes(p.image))      _images.unshift(p.image);
  if (!_images.length) _images = ['https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80'];
  if (Array.isArray(p.variants)){
    p.variants.forEach(function(v){ if(v.image && !_images.includes(v.image)) _images.push(v.image); });
  }
  _imgIndex = 0;

  // Breadcrumb + title
  var title      = p.title || p.name || 'Product';
  var category   = p.category || '';
  var sellerName = p.seller_name || p.sellerName || 'BConnect Seller';
  var location   = p.location || p.city || 'Kenya';
  var desc       = p.description || p.desc || '';
  var hasVariants = Array.isArray(p.variants) && p.variants.length > 0;

  document.getElementById('bc-title').textContent = title;
  if (category){
    document.getElementById('bc-breadcrumb').innerHTML =
      '<a href="pre-home.html">Home</a><span class="sep">›</span>' +
      '<a href="products.html">Marketplace</a><span class="sep">›</span>' +
      '<a href="products.html?category=' + encodeURIComponent(category) + '">' + esc(category) + '</a><span class="sep">›</span>' +
      '<span>' + esc(title) + '</span>';
  } else {
    document.getElementById('bc-title').textContent = title;
  }
  document.title = title + ' — BConnect';

  // Estimate original price (+20%)
  var origPrice = Math.round(_basePrice * 1.22 / 5) * 5;
  var savePct   = origPrice > _basePrice ? Math.round((1 - _basePrice/origPrice)*100) : 0;

  // ── Build HTML ──────────────────────────────────────────────────────────────
  var html = '';

  // ── LEFT: Gallery ──
  html += '<div class="gallery">';
  html += '<div class="main-img-wrap" id="pd-img-wrap">';
  html += '<span class="badge-pill">🔥 Top Rated</span>';
  html += '<img id="pd-main-img" src="' + esc(_images[0]) + '" alt="' + esc(title) + '" onerror="this.src=\'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80\'">';
  if (_images.length > 1){
    html += '<button class="img-nav left" onclick="navImg(-1)">&#8249;</button>';
    html += '<button class="img-nav right" onclick="navImg(1)">&#8250;</button>';
    html += '<div class="img-counter" id="pd-img-counter">1 / ' + _images.length + '</div>';
  }
  html += '</div>';

  // Thumbnails (up to 4)
  if (_images.length > 1){
    html += '<div class="thumbs" id="pd-thumbs">';
    _images.slice(0, 5).forEach(function(url, i){
      html += '<div class="thumb' + (i===0?' active':'') + '" onclick="selectThumb(this,' + i + ')">';
      html += '<img src="' + esc(url) + '" alt="img ' + (i+1) + '" onerror="this.src=\'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=120&q=70\'">';
      html += '</div>';
    });
    html += '</div>';
  } else {
    // 1 image: show 4 copies as placeholder thumbnails
    html += '<div class="thumbs" id="pd-thumbs">';
    html += '<div class="thumb active" onclick="selectThumb(this,0)"><img src="' + esc(_images[0]) + '" alt="img"></div>';
    html += '</div>';
  }

  html += '</div>'; // gallery

  // ── RIGHT: Info ──
  html += '<div class="info">';

  // Seller row
  var initials = (sellerName||'S').charAt(0).toUpperCase();
  html += '<div class="seller-row">';
  html += '<div class="seller-avatar">' + esc(initials) + '</div>';
  html += '<div class="seller-meta">';
  html += '<div class="seller-name">' + esc(sellerName) + '</div>';
  html += '<div class="seller-location">📍 ' + esc(location) + '</div>';
  html += '</div>';
  html += '<div class="verified-badge">✔ Verified</div>';
  html += '</div>';

  // Title + subtitle
  html += '<h1 class="product-title">' + esc(title) + '</h1>';
  if (desc){
    var shortDesc = desc.length > 120 ? desc.slice(0, 120).trim() + '…' : desc;
    html += '<p class="product-subtitle">' + esc(shortDesc) + '</p>';
  }

  // Stars
  var reviews = p.views ? Math.max(p.views, 1) : (Math.floor(Math.random()*200)+50);
  html += '<div class="stars-row"><span class="s">★★★★</span><span style="color:#dde4ef;font-size:1rem">★</span><span class="count">4.8 (' + reviews + ' reviews)</span></div>';

  // Variants
  if (hasVariants){
    html += '<div class="sect-label">Choose an option</div>';
    var manyVariants = p.variants.length > 4;
    html += '<div class="' + (manyVariants ? 'vstrip' : 'variants-grid') + '" id="pd-vstrip">';
    p.variants.forEach(function(v, i){
      var vname  = v.name || v.category || v.color || v.size || ('Option ' + (i+1));
      var vimg   = v.image || _images[0];
      var vprice = v.price ? fmtKes(v.price) : '';
      html += '<div class="vcard' + (i===0?' active':'') + '" onclick="selectVariant(this,' + i + ')">';
      html += '<img src="' + esc(vimg) + '" alt="' + esc(vname) + '" onerror="this.src=\'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&q=70\'">';
      html += '<div class="v-name" title="' + esc(vname) + '">' + esc(vname) + '</div>';
      if (vprice) html += '<div class="v-price">' + esc(vprice) + '</div>';
      html += '</div>';
    });
    html += '</div>';
    setTimeout(function(){ var c=document.querySelector('.vcard'); if(c) selectVariant(c,0); }, 50);
  }

  // Price
  html += '<div class="price-row">';
  html += '<div class="price-main"><span class="price-currency">Ksh </span><span id="pd-price">' + Number(_basePrice).toLocaleString() + '</span></div>';
  if (origPrice > _basePrice){
    html += '<div class="price-old">' + fmtKes(origPrice) + '</div>';
    html += '<div class="price-save">Save ' + savePct + '%</div>';
  }
  html += '<span class="price-diff-pill" id="pd-price-diff"></span>';
  html += '</div>';

  // Quantity
  html += '<div class="sect-label">Quantity</div>';
  html += '<div class="qty-row">';
  html += '<div class="qty-ctrl">';
  html += '<button class="qty-btn" onclick="changeQty(-1)">−</button>';
  html += '<div class="qty-val" id="pd-qty">1</div>';
  html += '<button class="qty-btn" onclick="changeQty(1)">+</button>';
  html += '</div>';
  html += '<span class="stock-info">✓ In stock</span>';
  html += '</div>';

  // Action buttons
  html += '<div class="actions">';
  html += '<button class="btn btn-avail" onclick="openAvailSheet()">📍 Check Availability</button>';
  html += '<button class="btn btn-cart" onclick="addToCart()">🛒 Add to Cart</button>';
  html += '<button class="btn btn-buy" onclick="buyNow()">⚡ Buy Now</button>';
  html += '</div>';

  // About card
  var longDesc = desc.length > 0;
  if (longDesc){
    var needsCollapse = desc.length > 220;
    html += '<div class="about-card' + (needsCollapse ? ' collapsed' : '') + '" id="pd-about">';
    html += '<h3>About This Product</h3>';
    html += '<p>' + esc(desc) + '</p>';
    if (needsCollapse){
      html += '<button class="about-toggle" id="pd-about-toggle" onclick="expandDesc()">Read more ▾</button>';
    }
    // Tags from category
    html += '<div class="tags">';
    if (category) html += '<span class="tag">' + esc(category) + '</span>';
    html += '<span class="tag">BConnect Verified</span>';
    if (_basePrice >= 4000) html += '<span class="tag">🚚 Free Delivery</span>';
    html += '<span class="tag">Secure Payment</span>';
    html += '</div>';
    html += '</div>';
  }

  html += '</div>'; // info

  // Inject into page
  document.getElementById('pd-page').innerHTML = html;

  // Load related
  var currentId = String(p._id || p.id || '');
  if (category) loadRelated(category, currentId);
}

// ── Related products ──────────────────────────────────────────────────────────
function loadRelated(category, currentId){
  fetch('/api/products?limit=8&category=' + encodeURIComponent(category))
    .then(function(r){ return r.json(); })
    .then(function(d){
      var products = (d.products || d.data || []).filter(function(p){
        return String(p._id || p.id || '') !== currentId;
      }).slice(0, 4);
      if (!products.length) return;

      var html = '<div class="pd-page" style="display:block;padding-top:0">';
      html += '<div class="more-section">';
      html += '<div class="more-header">';
      html += '<h2>More in ' + esc(category) + '</h2>';
      html += '<a href="products.html?category=' + encodeURIComponent(category) + '">View all →</a>';
      html += '</div>';
      html += '<div class="more-grid">';
      products.forEach(function(p){
        var pid   = p._id || p.id || '';
        var name  = p.title || p.name || 'Product';
        var price = p.price ? fmtKes(p.price) : '';
        var img   = p.imageUrl || p.image_url || p.image || (Array.isArray(p.images)&&p.images[0]) || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&q=70';
        var brand = p.seller_name || p.sellerName || 'BConnect';
        html += '<a class="more-card" href="product.html?id=' + encodeURIComponent(String(pid)) + '">';
        html += '<div class="mc-img"><img src="' + esc(img) + '" alt="' + esc(name) + '" loading="lazy" onerror="this.src=\'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&q=70\'"></div>';
        html += '<div class="mc-info">';
        html += '<div class="mc-name" title="' + esc(name) + '">' + esc(name) + '</div>';
        html += '<div class="mc-brand">' + esc(brand) + '</div>';
        if (price) html += '<div class="mc-price">' + esc(price) + '</div>';
        html += '</div></a>';
      });
      html += '</div></div></div>';

      document.getElementById('pd-related-section').innerHTML = html;
    })
    .catch(function(){});
}

// ── Gallery controls ──────────────────────────────────────────────────────────
function selectThumb(thumb, idx){
  _imgIndex = idx;
  document.querySelectorAll('.thumb').forEach(function(t){ t.classList.remove('active'); });
  thumb.classList.add('active');
  var img = document.getElementById('pd-main-img');
  if (img){
    img.style.opacity = '0';
    setTimeout(function(){ img.src = _images[idx]; img.style.opacity = '1'; }, 130);
  }
  var ctr = document.getElementById('pd-img-counter');
  if (ctr) ctr.textContent = (idx+1) + ' / ' + _images.length;
}

function navImg(dir){
  _imgIndex = (_imgIndex + dir + _images.length) % _images.length;
  var img = document.getElementById('pd-main-img');
  if (img){ img.style.opacity='0'; setTimeout(function(){ img.src=_images[_imgIndex]; img.style.opacity='1'; },120); }
  var ctr = document.getElementById('pd-img-counter');
  if (ctr) ctr.textContent = (_imgIndex+1) + ' / ' + _images.length;
  document.querySelectorAll('.thumb').forEach(function(t,i){ t.classList.toggle('active', i===_imgIndex); });
}

// ── Variant selection ─────────────────────────────────────────────────────────
function selectVariant(card, idx){
  if (!_product || !Array.isArray(_product.variants)) return;
  document.querySelectorAll('.vcard').forEach(function(c){ c.classList.remove('active'); });
  card.classList.add('active');
  var v = _product.variants[idx];
  _selectedVariant = v;

  // Update image
  var newImg = v.image || _images[0];
  var img = document.getElementById('pd-main-img');
  if (img && img.src !== newImg){
    img.style.opacity = '0';
    setTimeout(function(){ img.src=newImg; img.style.opacity='1'; }, 130);
  }

  // Update price
  var priceEl = document.getElementById('pd-price');
  var diffEl  = document.getElementById('pd-price-diff');
  if (v.price && priceEl){
    priceEl.textContent = Number(v.price).toLocaleString();
    if (diffEl){
      var diff = v.price - _basePrice;
      if (diff !== 0){
        diffEl.textContent = (diff>0?'+':'') + fmtKes(Math.abs(diff));
        diffEl.className = 'price-diff-pill ' + (diff>0?'up':'down');
      } else {
        diffEl.className = 'price-diff-pill';
      }
    }
  }
  card.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

// ── Quantity ──────────────────────────────────────────────────────────────────
function changeQty(d){
  _qty = Math.max(1, Math.min(99, _qty + d));
  var el = document.getElementById('pd-qty');
  if (el) el.textContent = _qty;
}

// ── Description expand ────────────────────────────────────────────────────────
function expandDesc(){
  var el  = document.getElementById('pd-about');
  var btn = document.getElementById('pd-about-toggle');
  if (el)  el.classList.remove('collapsed');
  if (btn) btn.remove();
}

// ── Auth guard ────────────────────────────────────────────────────────────────
function requireAuth(){
  if (!getUser()){ window.location.href='login.html?next='+encodeURIComponent(location.href); return false; }
  return true;
}

function buildItem(){
  var p = _product;
  var v = _selectedVariant;
  return {
    _id:          String(p._id || p.id || ''),
    title:        p.title || p.name || 'Product',
    price:        (v && v.price) ? v.price : _basePrice,
    imageUrl:     (v && v.image) ? v.image : (_images[0] || ''),
    seller_id:    p.seller_id || p.sellerId || null,
    _variantLabel: v ? [v.name||v.category, v.size, v.color].filter(Boolean).join(' · ') : ''
  };
}

// ── Add to cart ───────────────────────────────────────────────────────────────
function addToCart(){
  if (!requireAuth()) return;
  var item = buildItem();
  item.qty = _qty;
  var cart = JSON.parse(localStorage.getItem('bc_cart')||'[]');
  var key  = item._variantLabel || '';
  var existing = cart.find(function(c){ return c._id===item._id && (c._variantLabel||'')===key; });
  if (existing){ existing.qty = (existing.qty||1) + _qty; }
  else { cart.push(item); }
  localStorage.setItem('bc_cart', JSON.stringify(cart));
  if (window.updateCartBadge) window.updateCartBadge();
  showToast('✓ Added to cart');
}

// ── Buy now ───────────────────────────────────────────────────────────────────
function buyNow(){
  if (!requireAuth()) return;
  var item  = buildItem();
  var total = item.price * _qty;
  var label = item.title + (item._variantLabel ? ' · ' + item._variantLabel : '') + (_qty > 1 ? ' ×' + _qty : '');
  window.location.href = 'payment.html?type=order'
    + '&item='     + encodeURIComponent(label)
    + '&price='    + encodeURIComponent(total)
    + '&returnTo=' + encodeURIComponent(location.href);
}

// ── Favourites ────────────────────────────────────────────────────────────────
function toggleFav(){
  _isFav = !_isFav;
  showToast(_isFav ? '♥ Saved to favourites' : 'Removed from favourites');
}

// ── Check availability ────────────────────────────────────────────────────────
function openAvailSheet(){
  if (!_product) return;
  var title   = _product.title || _product.name || 'Product';
  var price   = (_selectedVariant && _selectedVariant.price) ? _selectedVariant.price : _basePrice;
  var variant = _selectedVariant
    ? [_selectedVariant.name||_selectedVariant.category, _selectedVariant.size, _selectedVariant.color].filter(Boolean).join(' · ')
    : '';
  var imgUrl = (_selectedVariant && _selectedVariant.image) ? _selectedVariant.image : (_images[0] || '');
  var msg = 'Hi, I would like to check availability for:\n'
    + '*' + title + '*'
    + (variant ? ' (' + variant + ')' : '')
    + '\nPrice: ' + fmtKes(price);
  if (imgUrl) msg += '\n\nProduct image:\n' + imgUrl;
  msg += '\n\nIs this item currently in stock?';
  window.location.href = 'contact.html?message=' + encodeURIComponent(msg);
}
</script>
